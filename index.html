<div id="root"></div>

<script>
  async function getWxoToken() {
    const res = await fetch("/api/wxo-token", {
      method: "GET",
      headers: { "Accept": "application/json" }
    });

    if (!res.ok) {
      throw new Error("Erro ao buscar JWT em /api/wxo-token");
    }

    const data = await res.json();
    return data.token;
  }

  function onChatLoad(instance) {
    instance.on("authTokenNeeded", async function (event) {
      try {
        event.authToken = await getWxoToken();
        console.log("JWT enviado ao Watsonx Orchestrate");
      } catch (e) {
        console.error("Falha ao gerar/enviar JWT:", e);
      }
    });
  }

  window.wxOConfiguration = {
    orchestrationID: "20250515-0817-2486-8019-c55acc2aa9da_20250515-1932-5868-002f-259f7ce4a770",
    hostURL: "https://dl.watson-orchestrate.ibm.com",
    rootElementID: "root",
    chatOptions: {
      agentId: "7122d0d6-890d-40df-a29f-441c6adcdfca",
      agentEnvironmentId: "d102f2a8-da38-4102-897a-a1e6eeca4480",
      onLoad: onChatLoad
    }
  };

  const script = document.createElement("script");
  script.src = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
  script.onload = function () {
    wxoLoader.init();
  };
  document.head.appendChild(script);
</script>
